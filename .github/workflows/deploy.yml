name: Deploy Tumya

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 10m
          sync: true
          script: |
            set -e

            cd /var/www/tumya

            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "Installing dependencies..."
            cd backend
            npm install

            echo "Restarting Tumya..."
            pm2 restart tumya

            echo "Saving PM2..."
            pm2 save

            echo "Deployment complete."